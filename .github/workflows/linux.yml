name: Linux

on:
  pull_request:
    paths:
      - ".github/workflows/linux.yml"
      - "linux/**"
      - "Makefile"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/linux.yml"
      - "linux/**"
      - "Makefile"

jobs:
  core:
    name: Core checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install runtime tools
        run: sudo apt-get update && sudo apt-get install -y git gh openssh-client sqlite3 pkg-config gjs gir1.2-gtk-4.0 gir1.2-adw-1 xvfb dbus-x11
      - name: Doctor
        run: make linux-doctor
      - name: State migration
        run: make linux-state-check
      - name: Tests
        run: make linux-test
      - name: GTK shell
        run: make linux-ui-check
      - name: Packaging metadata
        run: make linux-package-check
